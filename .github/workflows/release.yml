name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.7.0)'
        required: true
        default: 'v3.7.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── Determine version ───
      - name: Set release version
        id: version
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $ver = '${{ github.event.inputs.version }}'
          } else {
            $ver = '${{ github.ref_name }}'
          }
          # Strip leading 'v' if present
          $ver = $ver -replace '^v',''
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $ver"

      # ─── Build web app ───
      - name: Install web app dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      # ─── Prepare Electron package version ───
      - name: Update Electron package version
        run: |
          $pkgPath = 'release/package.json'
          $pkg = Get-Content $pkgPath | ConvertFrom-Json
          $pkg.version = '${{ steps.version.outputs.version }}'
          $pkg | ConvertTo-Json -Depth 10 | Set-Content $pkgPath -Encoding UTF8
          Write-Host "release/package.json version set to: $($pkg.version)"

      # ─── Build Electron app ───
      - name: Install Electron build tools
        run: |
          npm install --no-save electron-builder@26.0.12 --ignore-scripts
          cd release
          npm install --no-save electron@35.0.0 --ignore-scripts

      - name: Build Electron app
        run: npx electron-builder --projectDir release --config release/electron-builder.yml --publish=never --win nsis --win portable --win zip

      # ─── Upload to GitHub Release ───
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
