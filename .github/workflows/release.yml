name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.6.0)'
        required: true
        default: 'v3.6.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate lockfiles for fake integrity placeholders
        run: |
          $matches = Get-ChildItem -Path . -Recurse -File -Filter package-lock.json |
            Select-String -SimpleMatch -Pattern 'sha1-PLASH'
          if ($matches) {
            $matches | ForEach-Object { Write-Error "Invalid lockfile integrity placeholder: $($_.Path):$($_.LineNumber)" }
            throw "Found sha1-PLASH placeholders in lockfiles."
          }

      # ─── Build web app ───
      - name: Install web app dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      # ─── Build Electron app ───
      # Upgrade-only install, isolated to CI node_modules (no repo file changes).
      - name: Install Electron build tools
        run: npm install --no-save electron@latest electron-builder@latest --ignore-scripts

      - name: Build Electron app
        run: npx electron-builder --projectDir release --config release/electron-builder.yml --publish=never --win nsis --win portable --win zip

      # ─── Upload to GitHub Release ───
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
