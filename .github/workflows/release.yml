name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.6.0)'
        required: true
        default: 'v3.6.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── Build web app ───
      - name: Install web app dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      # ─── Build Electron app ───
      # Note: release/package-lock.json is a stub. We use npm install --ignore-scripts
      # to avoid running electron-builder install-app-deps (which needs electron-builder
      # to be already installed, a chicken-and-egg problem).
      - name: Install Electron dependencies
        working-directory: ./release
        run: npm install --ignore-scripts

      - name: Build Electron app
        working-directory: ./release
        run: npx electron-builder --win --publish=never

      # ─── Upload to GitHub Release ───
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
