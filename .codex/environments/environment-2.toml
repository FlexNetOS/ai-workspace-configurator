# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "ai-workspace-configurator"

[setup]
script = '''
pwsh

# Setup Script (PowerShell 7+)
$ErrorActionPreference = "Stop"
Set-StrictMode -Version Latest

$RepoRoot = if ($env:CODEX_REPO_ROOT) { $env:CODEX_REPO_ROOT } else { "F:\workspace\projects\ai-workspace-configurator" }
$RepoRoot = (Resolve-Path -LiteralPath $RepoRoot).Path
$GitDir = Join-Path $RepoRoot ".git"

if (-not (Test-Path -LiteralPath $GitDir -PathType Container)) {
  throw "Repo .git directory not found: $GitDir"
}

# 1) Ensure npm is discoverable for this session
if (-not (Get-Command npm.cmd -ErrorAction SilentlyContinue)) {
  $nodeCandidates = @(
    "$env:ProgramFiles\nodejs",
    "${env:ProgramFiles(x86)}\nodejs",
    "$env:LOCALAPPDATA\Programs\nodejs"
  ) | Where-Object { $_ -and (Test-Path -LiteralPath (Join-Path $_ "npm.cmd")) }

  if ($nodeCandidates.Count -gt 0) {
    $env:Path = "$($nodeCandidates[0]);$env:Path"
  }
}

if (-not (Get-Command npm.cmd -ErrorAction SilentlyContinue)) {
  Write-Warning "npm.cmd is still not on PATH. Install Node.js or add its nodejs folder to PATH."
}

# 2) Force writable cache locations inside repo
$cacheRoot = Join-Path $RepoRoot ".codex-cache"
$env:NPM_CONFIG_CACHE = Join-Path $cacheRoot "npm"
$env:ELECTRON_CACHE = Join-Path $cacheRoot "electron"
$env:ELECTRON_BUILDER_CACHE = Join-Path $cacheRoot "electron-builder"
New-Item -ItemType Directory -Path $env:NPM_CONFIG_CACHE,$env:ELECTRON_CACHE,$env:ELECTRON_BUILDER_CACHE -Force | Out-Null

# 3) Fix .git ACL so git can create index.lock
$userA = "$env:USERDOMAIN\$env:USERNAME"
$userB = "$env:USERNAME"
& icacls $GitDir /inheritance:e | Out-Null
& icacls $GitDir /remove:d "$userA" "$userB" /T /C | Out-Null
& icacls $GitDir /grant:r "$userA:(OI)(CI)M" /T /C | Out-Null

# 4) Smoke test git metadata write
$lockFile = Join-Path $GitDir "index.lock"
if (Test-Path -LiteralPath $lockFile) { Remove-Item -LiteralPath $lockFile -Force }
New-Item -ItemType File -Path $lockFile -Force | Out-Null
Remove-Item -LiteralPath $lockFile -Force

Write-Host "Codex setup complete."
'''

