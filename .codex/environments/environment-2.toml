[cleanup]
script = '''
pwsh

# Cleanup Script (PowerShell 7+)
$ErrorActionPreference = "Stop"
Set-StrictMode -Version Latest

$RepoRoot = if ($env:CODEX_REPO_ROOT) { $env:CODEX_REPO_ROOT } else { "F:\workspace\projects\ai-workspace-configurator" }
$RepoRoot = (Resolve-Path -LiteralPath $RepoRoot).Path

# Remove stale git lock if present
$lockFile = Join-Path $RepoRoot ".git\index.lock"
if (Test-Path -LiteralPath $lockFile) {
  Remove-Item -LiteralPath $lockFile -Force -ErrorAction SilentlyContinue
}

# Remove bad release lockfile if recreated
$badReleaseLock = Join-Path $RepoRoot "release\package-lock.json"
if (Test-Path -LiteralPath $badReleaseLock) {
  Remove-Item -LiteralPath $badReleaseLock -Force -ErrorAction SilentlyContinue
}

# Remove stale release-only node_modules from old flow
$releaseNodeModules = Join-Path $RepoRoot "release\node_modules"
if (Test-Path -LiteralPath $releaseNodeModules) {
  Remove-Item -LiteralPath $releaseNodeModules -Recurse -Force -ErrorAction SilentlyContinue
}

# Optional: clean repo-local caches used by setup script
$cacheRoot = Join-Path $RepoRoot ".codex-cache"
if (Test-Path -LiteralPath $cacheRoot) {
  Remove-Item -LiteralPath $cacheRoot -Recurse -Force -ErrorAction SilentlyContinue
}

Remove-Item Env:NPM_CONFIG_CACHE -ErrorAction SilentlyContinue
Remove-Item Env:ELECTRON_CACHE -ErrorAction SilentlyContinue
Remove-Item Env:ELECTRON_BUILDER_CACHE -ErrorAction SilentlyContinue

Write-Host "Codex cleanup complete."
'''

